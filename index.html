<script>
// Array in memoria per gli atleti (caricati da localStorage se esistono)
let atleti = JSON.parse(localStorage.getItem('ss_san_giovanni_atleti')) || [];

document.addEventListener('DOMContentLoaded', () => {
  // Configura i link di navigazione della Topbar
  const navLinks = document.querySelectorAll('.nav-link');
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      const pageTarget = link.getAttribute('data-page');
      switchPage(pageTarget);
    });
  });

  // Configura il toggle del pannello amministratore
  const adminToggle = document.getElementById('adminToggle');
  const adminBar = document.getElementById('adminBar');
  adminToggle.addEventListener('click', () => {
    adminBar.classList.toggle('open');
    adminToggle.classList.toggle('active');
  });

  // Rendering iniziale dei dati
  aggiornaRosa();
});

// Funzione per cambiare pagina attiva
function switchPage(pageId) {
  // Nascondi tutte le pagine
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  // Mostra la pagina selezionata
  const targetPage = document.getElementById(`page-${pageId}`);
  if(targetPage) targetPage.classList.add('active');

  // Aggiorna lo stato visivo della Topbar
  document.querySelectorAll('.nav-link').forEach(link => {
    link.classList.remove('active');
    if(link.getAttribute('data-page') === pageId) {
      link.classList.add('active');
    }
  });
}

// Funzioni di gestione Modali
function openModal(modalId) {
  const modal = document.getElementById(modalId);
  if(modal) modal.classList.add('open');
}

function closeModal(modalId) {
  const modal = document.getElementById(modalId);
  if(modal) modal.classList.remove('open');
}

// Salva Atleta nel LocalStorage ed esegui il refresh visivo
function salvaAtleta(event) {
  event.preventDefault();
  
  const nome = document.getElementById('mr-nome').value;
  const cognome = document.getElementById('mr-cognome').value;
  const numero = document.getElementById('mr-num').value;
  const ruolo = document.getElementById('mr-ruolo').value;

  const nuovoAtleta = { id: Date.now(), nome, cognome, numero, ruolo };
  atleti.push(nuovoAtleta);
  
  localStorage.setItem('ss_san_giovanni_atleti', JSON.stringify(atleti));
  
  // Reset form e chiusura modal
  document.getElementById('form-atleta').reset();
  closeModal('modalAtleta');
  
  // Aggiorna l'interfaccia
  aggiornaRosa();
}

// Svuota le griglie e ricrea le card della rosa aggiornata
function aggiornaRosa() {
  // Pulisci i contenitori dei ruoli
  const ruoli = ['Portiere', 'Difensore', 'Centrocampista', 'Attaccante'];
  ruoli.forEach(r => {
    const grid = document.getElementById(`grid-${r}`);
    if(grid) grid.innerHTML = '';
  });

  // Popola con gli atleti salvati
  atleti.forEach(atleta => {
    const grid = document.getElementById(`grid-${atleta.ruolo}`);
    if(grid) {
      // Determina la classe CSS abbreviata del ruolo per lo stile del cerchio numero
      let ruoloClass = 'att';
      if(atleta.ruolo === 'Portiere') ruoloClass = 'porta';
      else if(atleta.ruolo === 'Difensore') ruoloClass = 'dif';
      else if(atleta.ruolo === 'Centrocampista') ruoloClass = 'cen';

      const card = document.createElement('div');
      card.className = 'rosa-card';
      card.innerHTML = `
        <div class="r-num ${ruoloClass}">${atleta.numero}</div>
        <div class="r-info">
          <div class="r-name">${atleta.nome} ${atleta.cognome}</div>
          <div class="r-sub">${atleta.ruolo}</div>
        </div>
        <div class="r-actions">
          <button class="btn btn-secondary btn-sm" onclick="rimuoviAtleta(${atleta.id})">❌</button>
        </div>
      `;
      grid.appendChild(card);
    }
  });

  // Aggiorna il counter nella Hero della Home
  const statCounter = document.getElementById('stat-atleti');
  if(statCounter) statCounter.innerText = atleti.length;
}

// Rimuove un atleta
function rimuoviAtleta(id) {
  if(confirm('Vuoi davvero rimuovere questo atleta dalla rosa?')) {
    atleti = atleti.filter(a => a.id !== id);
    localStorage.setItem('ss_san_giovanni_atleti', JSON.stringify(atleti));
    aggiornaRosa();
  }
}
</script>
